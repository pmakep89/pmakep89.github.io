<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ 운명의 서 ✦ 사주·성명학·궁합</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Cinzel+Decorative:wght@400;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080b14;
    --bg2: #0d1225;
    --card: #111827;
    --card2: #1a2235;
    --border: #2a3a5c;
    --accent: #c9a84c;
    --accent2: #e8c96a;
    --purple: #7c5cbf;
    --purple2: #a07fe0;
    --teal: #2dd4bf;
    --text: #e8dcc8;
    --text2: #9aa3b8;
    --glow: rgba(201,168,76,0.15);
    --glow2: rgba(124,92,191,0.2);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: radial-gradient(ellipse at 50% 0%, #1a0a2e 0%, #0a0515 40%, #080b14 100%);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 성운 배경 */
  body::before {
    content:'';
    position:fixed; inset:0;
    background:
      radial-gradient(ellipse at 15% 30%, rgba(138,43,226,0.18) 0%, transparent 50%),
      radial-gradient(ellipse at 85% 20%, rgba(201,168,76,0.12) 0%, transparent 45%),
      radial-gradient(ellipse at 70% 75%, rgba(72,61,139,0.2) 0%, transparent 55%),
      radial-gradient(ellipse at 25% 80%, rgba(0,100,150,0.1) 0%, transparent 45%),
      radial-gradient(ellipse at 50% 50%, rgba(100,0,150,0.08) 0%, transparent 70%);
    pointer-events:none; z-index:0;
    animation: nebulaPulse 10s ease-in-out infinite alternate;
  }
  body::after {
    content:'';
    position:fixed; inset:0;
    background:
      radial-gradient(ellipse at 90% 60%, rgba(255,100,200,0.06) 0%, transparent 40%),
      radial-gradient(ellipse at 10% 60%, rgba(100,200,255,0.06) 0%, transparent 40%);
    pointer-events:none; z-index:0;
    animation: nebulaPulse 14s ease-in-out infinite alternate-reverse;
  }
  @keyframes nebulaPulse {
    from { opacity:0.5; transform:scale(1); }
    to { opacity:1; transform:scale(1.05); }
  }

  /* 달 */
  .moon {
    position:fixed; top:60px; right:80px;
    width:70px; height:70px;
    border-radius:50%;
    background: radial-gradient(circle at 35% 35%, #fffde7, #f5d060 40%, #c9a84c 70%, #8b6914);
    box-shadow: 0 0 30px rgba(201,168,76,0.4), 0 0 60px rgba(201,168,76,0.15), inset -8px -8px 20px rgba(0,0,0,0.3);
    z-index:1; pointer-events:none;
    animation: moonGlow 4s ease-in-out infinite alternate;
  }
  .moon::before {
    content:'';
    position:absolute; top:12px; left:16px;
    width:12px; height:12px; border-radius:50%;
    background:rgba(0,0,0,0.15);
    box-shadow: 18px 8px 0 rgba(0,0,0,0.1), 8px 25px 0 rgba(0,0,0,0.08);
  }
  @keyframes moonGlow {
    from { box-shadow:0 0 20px rgba(201,168,76,0.3), 0 0 40px rgba(201,168,76,0.1), inset -8px -8px 20px rgba(0,0,0,0.3); }
    to { box-shadow:0 0 40px rgba(201,168,76,0.6), 0 0 80px rgba(201,168,76,0.25), inset -8px -8px 20px rgba(0,0,0,0.3); }
  }

  /* 별 */
  .stars {
    position:fixed; inset:0; pointer-events:none; z-index:0;
    overflow:hidden;
  }
  .star {
    position:absolute; border-radius:50%;
    background:#fff; animation: twinkle var(--d, 3s) var(--delay, 0s) ease-in-out infinite alternate;
  }
  .star.big {
    background: radial-gradient(circle, #fff 0%, rgba(201,168,76,0.8) 50%, transparent 100%);
    box-shadow: 0 0 6px rgba(255,255,255,0.8);
  }
  @keyframes twinkle {
    from { opacity:0.1; transform:scale(0.8); }
    to { opacity:1; transform:scale(1.3); }
  }

  /* 유성 */
  .shooting-star {
    position:fixed; pointer-events:none; z-index:1;
    width:2px; height:2px; border-radius:50%;
    background:white;
    box-shadow: 0 0 4px white;
    animation: shoot var(--dur, 3s) var(--delay, 0s) linear infinite;
    opacity:0;
  }
  @keyframes shoot {
    0% { opacity:0; transform:translate(0,0) rotate(-45deg); }
    5% { opacity:1; }
    30% { opacity:0; transform:translate(300px, 300px) rotate(-45deg); }
    100% { opacity:0; transform:translate(300px, 300px) rotate(-45deg); }
  }
  .shooting-star::after {
    content:'';
    position:absolute; top:0; right:2px;
    width:80px; height:1px;
    background:linear-gradient(to left, white, transparent);
    transform:translateX(100%);
  }

  /* Header */
  header {
    position:relative; z-index:10;
    text-align:center; padding: 50px 20px 30px;
    border-bottom: 1px solid rgba(201,168,76,0.15);
  }
  header .subtitle {
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.7rem; letter-spacing: 0.4em;
    color: var(--accent); opacity:0.8;
    margin-bottom: 12px;
    text-transform: uppercase;
  }
  header h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-weight:700;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 50%, var(--purple2) 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
    line-height:1.2; margin-bottom:10px;
  }
  header p {
    color: var(--text2); font-size:0.9rem; font-weight:300;
    letter-spacing:0.05em;
  }
  .header-ornament {
    display:flex; align-items:center; justify-content:center; gap:16px;
    margin: 16px 0 0;
    color: var(--accent); opacity:0.5; font-size:0.8rem; letter-spacing:0.3em;
  }
  .header-ornament::before, .header-ornament::after {
    content:''; flex:1; max-width:120px; height:1px;
    background: linear-gradient(90deg, transparent, var(--accent));
  }
  .header-ornament::after { background: linear-gradient(90deg, var(--accent), transparent); }

  /* Tab Nav */
  .tab-nav {
    position:relative; z-index:10;
    display:flex; gap:0; overflow-x:auto;
    padding: 20px 16px 0;
    scrollbar-width:none; -webkit-overflow-scrolling:touch;
    max-width: 900px; margin: 0 auto;
    justify-content: center;
  }
  .tab-nav::-webkit-scrollbar { display:none; }
  .tab-btn {
    flex-shrink:0;
    background:none; border:none; cursor:pointer;
    padding: 10px 18px 12px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.82rem; font-weight:500;
    color: var(--text2);
    border-bottom: 2px solid transparent;
    transition: all 0.25s;
    white-space:nowrap;
    position:relative;
  }
  .tab-btn .tab-icon { font-size:1rem; display:block; margin-bottom:3px; }
  .tab-btn:hover { color: var(--accent); }
  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .tab-btn.active::after {
    content:'';
    position:absolute; bottom:-2px; left:50%; transform:translateX(-50%);
    width:6px; height:6px; border-radius:50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
  }

  /* Main Content */
  .main {
    position:relative; z-index:10;
    max-width: 700px; margin: 0 auto;
    padding: 24px 16px 60px;
  }

  .tab-panel { display:none; animation: fadeIn 0.4s ease; }
  .tab-panel.active { display:block; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

  /* Card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 24px;
    margin-bottom: 16px;
    position:relative; overflow:hidden;
  }
  .card::before {
    content:'';
    position:absolute; top:0; left:0; right:0; height:1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity:0.4;
  }
  .card-title {
    font-family: 'Noto Serif KR', serif;
    font-size:1.1rem; font-weight:600;
    color: var(--accent2);
    margin-bottom: 20px;
    display:flex; align-items:center; gap:8px;
  }
  .card-title span { font-size:1.2rem; }

  /* Form Elements */
  .form-row { margin-bottom: 16px; }
  .form-row label {
    display:block; font-size:0.78rem; color:var(--text2);
    margin-bottom:6px; letter-spacing:0.05em;
  }
  .form-row input, .form-row select {
    width:100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.9rem;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance:none;
  }
  .form-row input:focus, .form-row select:focus {
    outline:none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
  }
  .form-row select option { background: var(--bg2); }
  .form-row input::placeholder { color: #4a5568; }
  .date-select-wrap { display:flex; gap:6px; }
  .date-sel { flex:1; background:rgba(255,255,255,0.05); border:1px solid rgba(196,181,253,0.2); border-radius:10px; color:white; padding:10px 6px; font-size:0.85rem; font-family:'Noto Sans KR',sans-serif; cursor:pointer; }
  .date-sel option { background:#1a0533; color:white; }

  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  @media(max-width:400px) { .form-grid { grid-template-columns:1fr; } }

  .radio-group { display:flex; gap:12px; }
  .radio-label {
    flex:1; display:flex; align-items:center; justify-content:center;
    gap:8px; padding:10px; border-radius:10px;
    border:1px solid var(--border); cursor:pointer;
    color:var(--text2); font-size:0.85rem;
    transition: all 0.2s; background: var(--bg2);
  }
  .radio-label input { display:none; }
  .radio-label.checked {
    border-color: var(--accent); color:var(--accent);
    background: rgba(201,168,76,0.08);
    box-shadow: 0 0 12px rgba(201,168,76,0.1);
  }

  /* CTA Button */
  .btn-divine {
    width:100%; padding: 16px;
    background: linear-gradient(135deg, #8b6914, var(--accent), #c9a84c);
    border:none; border-radius:12px; cursor:pointer;
    font-family: 'Noto Serif KR', serif;
    font-size:1rem; font-weight:600; color:#080b14;
    letter-spacing:0.08em;
    transition: all 0.3s;
    position:relative; overflow:hidden;
    margin-top:8px;
  }
  .btn-divine::before {
    content:'';
    position:absolute; inset:0;
    background: linear-gradient(135deg, transparent, rgba(255,255,255,0.2), transparent);
    transform: translateX(-100%);
    transition: transform 0.5s;
  }
  .btn-divine:hover { transform:translateY(-2px); box-shadow: 0 8px 24px rgba(201,168,76,0.3); }
  .btn-divine:hover::before { transform: translateX(100%); }
  .btn-divine:active { transform:translateY(0); }

  /* Divider */
  .divider {
    display:flex; align-items:center; gap:12px;
    margin: 8px 0 16px; color:var(--text2); font-size:0.75rem;
  }
  .divider::before, .divider::after {
    content:''; flex:1; height:1px; background:var(--border);
  }

  /* Ad Modal */
  .modal-overlay {
    position:fixed; inset:0; z-index:1000;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    display:none; align-items:center; justify-content:center;
    padding:16px;
  }
  .modal-overlay.show { display:flex; }
  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    width:100%; max-width:480px;
    overflow:hidden;
    position:relative;
    box-shadow: 0 24px 60px rgba(0,0,0,0.6), 0 0 60px rgba(124,92,191,0.1);
    animation: modalIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes modalIn {
    from { opacity:0; transform:scale(0.85) translateY(20px); }
    to { opacity:1; transform:scale(1) translateY(0); }
  }

  .modal-ad-top {
    background: linear-gradient(135deg, #0d1225, #1a1035);
    border-bottom:1px solid var(--border);
    padding:14px 20px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .ad-badge {
    font-size:0.65rem; color:var(--text2);
    background:rgba(255,255,255,0.06);
    padding:3px 8px; border-radius:4px;
    letter-spacing:0.1em; text-transform:uppercase;
  }
  .modal-timer-wrap {
    display:flex; align-items:center; gap:6px;
  }
  .modal-timer {
    font-family: 'Cinzel Decorative', serif;
    font-size:1.1rem; color:var(--accent);
    min-width:24px; text-align:center;
  }
  .modal-timer-label { font-size:0.72rem; color:var(--text2); }

  .modal-ad-content {
    padding: 28px 24px 20px;
    text-align:center;
  }
  .modal-quote {
    font-family: 'Noto Serif KR', serif;
    font-size:1.15rem; font-weight:600;
    color: var(--accent2);
    line-height:1.7; margin-bottom:12px;
  }
  .modal-quote-source {
    font-size:0.8rem; color:var(--text2);
    font-style:italic;
  }

  .modal-divider {
    height:1px; background: var(--border);
    margin: 20px 0;
  }

  .modal-result-area {
    padding: 0 24px 24px;
  }
  .modal-result-title {
    font-size:0.75rem; color:var(--text2);
    letter-spacing:0.12em; text-transform:uppercase;
    margin-bottom:14px;
    display:flex; align-items:center; gap:8px;
  }
  .modal-result-title::after {
    content:''; flex:1; height:1px; background:var(--border);
  }

  .result-loading {
    display:flex; flex-direction:column; align-items:center; gap:12px;
    padding:20px 0; color:var(--text2);
  }
  .result-spinner {
    width:36px; height:36px;
    border:2px solid var(--border);
    border-top-color: var(--accent);
    border-radius:50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  .result-loading p { font-size:0.82rem; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

  .result-text {
    display:none;
    font-family:'Noto Serif KR', serif;
    font-size:0.88rem; line-height:1.9;
    color:var(--text);
  }
  .result-text.show { display:block; animation: fadeIn 0.5s ease; }

  .modal-close-btn {
    display:none; width:100%; padding:13px;
    background: linear-gradient(135deg, var(--purple), var(--purple2));
    border:none; border-radius:0 0 20px 20px;
    color:#fff; font-family:'Noto Sans KR', sans-serif;
    font-size:0.9rem; font-weight:500;
    cursor:pointer; transition:opacity 0.2s;
    letter-spacing:0.05em;
  }
  .modal-close-btn:hover { opacity:0.9; }
  .modal-close-btn.show { display:block; animation: fadeIn 0.3s ease; }

  /* Result section (after modal) */
  .result-card {
    display:none;
    background: var(--card2);
    border:1px solid rgba(201,168,76,0.2);
    border-radius:20px; padding:28px;
    margin-top:16px;
    animation: fadeIn 0.5s ease;
  }
  .result-card.show { display:block; }
  .result-card-header {
    display:flex; align-items:center; gap:10px;
    margin-bottom:20px;
    padding-bottom:16px;
    border-bottom:1px solid var(--border);
  }
  .result-icon { font-size:1.8rem; }
  .result-card-title {
    font-family:'Noto Serif KR', serif;
    font-size:1.1rem; font-weight:600; color:var(--accent2);
  }
  .result-content {
    font-family:'Noto Sans KR', sans-serif;
    font-size:0.95rem; line-height:2.2;
    color:var(--text); white-space:pre-wrap;
    word-break:keep-all;
  }

  /* Section divider label */
  .section-label {
    font-size:0.72rem; color:var(--text2);
    letter-spacing:0.15em; text-transform:uppercase;
    margin-bottom:16px; margin-top:28px;
    display:flex; align-items:center; gap:10px;
  }
  .section-label::before { content:'✦'; color:var(--accent); font-size:0.6rem; }

  /* Zodiac grid */
  .zodiac-grid {
    display:grid; grid-template-columns: repeat(4, 1fr); gap:8px;
    margin-bottom:16px;
  }
  .zodiac-btn {
    background:var(--bg2); border:1px solid var(--border);
    border-radius:10px; padding:10px 4px;
    cursor:pointer; text-align:center;
    transition:all 0.2s; color:var(--text2);
    font-size:0.75rem; font-family:'Noto Sans KR',sans-serif;
  }
  .zodiac-btn .z-icon { font-size:1.4rem; display:block; margin-bottom:4px; }
  .zodiac-btn:hover { border-color:var(--accent); color:var(--accent); }
  .zodiac-btn.selected {
    border-color:var(--accent); color:var(--accent);
    background:rgba(201,168,76,0.08);
    box-shadow:0 0 12px rgba(201,168,76,0.1);
  }

  /* Compatibility hearts */
  .compat-section {
    display:grid; grid-template-columns:1fr auto 1fr; gap:12px; align-items:start;
  }
  .compat-divider-icon {
    display:flex; align-items:center; justify-content:center;
    padding-top:28px; font-size:1.4rem; color:var(--purple2);
  }

  /* Responsive */
  @media(max-width:480px) {
    .card { padding:20px 16px; }
    .modal { border-radius:16px; }
    .modal-ad-content { padding:20px 16px 16px; }
    .modal-result-area { padding:0 16px 20px; }
  }
</style>
</head>
<body>

<!-- Stars -->
<div class="moon"></div>
<div class="stars" id="stars"></div>
<div id="shooting-stars"></div>

<!-- Header -->
<header>
  <div class="subtitle">✦ Mystic Oracle ✦</div>
  <h1>운명의 서</h1>
  <p>사주 · 성명학 · 궁합 · 오늘의 운세</p>
  <div class="header-ornament">✦ ✦ ✦</div>
</header>

<!-- Tabs -->
<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('saju')">
    <span class="tab-icon">🔮</span>사주
  </button>
  <button class="tab-btn" onclick="switchTab('sungmyung')">
    <span class="tab-icon">✍️</span>성명학
  </button>
  <button class="tab-btn" onclick="switchTab('gunghap')">
    <span class="tab-icon">💫</span>궁합
  </button>
  <button class="tab-btn" onclick="switchTab('today')">
    <span class="tab-icon">☀️</span>오늘의 운세
  </button>
  <button class="tab-btn" onclick="switchTab('yearly')">
    <span class="tab-icon">🌟</span>신년/월별
  </button>
  <button class="tab-btn" onclick="switchTab('zodiac')">
    <span class="tab-icon">🐉</span>띠별
  </button>
</div>

<!-- Main -->
<div class="main">

  <!-- 사주 -->
  <div class="tab-panel active" id="tab-saju">
    <div class="card">
      <div class="card-title"><span>🔮</span> 사주팔자 풀이</div>
      <div class="form-row">
        <label>이름</label>
        <input type="text" id="saju-name" placeholder="이름을 입력하세요">
      </div>
      <div class="form-row">
        <label>생년월일</label>
        <div class="date-select-wrap">
          <select class="date-sel" id="saju-date-year"><option value="">년도</option>
          <option value="1940">1940년</option>
          <option value="1941">1941년</option>
          <option value="1942">1942년</option>
          <option value="1943">1943년</option>
          <option value="1944">1944년</option>
          <option value="1945">1945년</option>
          <option value="1946">1946년</option>
          <option value="1947">1947년</option>
          <option value="1948">1948년</option>
          <option value="1949">1949년</option>
          <option value="1950">1950년</option>
          <option value="1951">1951년</option>
          <option value="1952">1952년</option>
          <option value="1953">1953년</option>
          <option value="1954">1954년</option>
          <option value="1955">1955년</option>
          <option value="1956">1956년</option>
          <option value="1957">1957년</option>
          <option value="1958">1958년</option>
          <option value="1959">1959년</option>
          <option value="1960">1960년</option>
          <option value="1961">1961년</option>
          <option value="1962">1962년</option>
          <option value="1963">1963년</option>
          <option value="1964">1964년</option>
          <option value="1965">1965년</option>
          <option value="1966">1966년</option>
          <option value="1967">1967년</option>
          <option value="1968">1968년</option>
          <option value="1969">1969년</option>
          <option value="1970">1970년</option>
          <option value="1971">1971년</option>
          <option value="1972">1972년</option>
          <option value="1973">1973년</option>
          <option value="1974">1974년</option>

<script>
// ─── Stars ───────────────────────────────────────────
(function createStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 150; i++) {
    const s = document.createElement('div');
    const isBig = Math.random() < 0.15;
    s.className = 'star' + (isBig ? ' big' : '');
    const size = isBig ? Math.random() * 3 + 2 : Math.random() * 1.5 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      --d:${2+Math.random()*5}s;
      --delay:${Math.random()*6}s;
    `;
    container.appendChild(s);
  }

  // 유성 생성
  const ssContainer = document.getElementById('shooting-stars');
  for (let i = 0; i < 5; i++) {
    const ss = document.createElement('div');
    ss.className = 'shooting-star';
    ss.style.cssText = `
      left:${10 + Math.random()*60}%;
      top:${Math.random()*40}%;
      --dur:${6+Math.random()*8}s;
      --delay:${Math.random()*10}s;
    `;
    ssContainer.appendChild(ss);
  }
})();

// ─── Tab switching ───────────────────────────────────
function switchTab(id) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  document.querySelector(`.tab-btn[onclick="switchTab('${id}')"]`).classList.add('active');
}

// ─── Radio styling ───────────────────────────────────
function updateRadio(name) {
  document.querySelectorAll(`input[name="${name}"]`).forEach(r => {
    r.parentElement.classList.toggle('checked', r.checked);
  });
}

}

      date: getDateValue('saju-date'),
      hour: document.getElementById('saju-hour').value,
      gender: document.querySelector('input[name="saju-gender"]:checked')?.value || '남성'
    };
    if (!data.name || !data.date) valid = false;
  } else if (type === 'sungmyung') {
    data = {
      name: document.getElementById('sm-name').value.trim(),
      date: getDateValue('sm-date'),
    };
    if (!data.name) valid = false;
  } else if (type === 'gunghap') {
    data = {
      name1: document.getElementById('gh-name1').value.trim(),
      date1: getDateValue('gh-date1'),
      gender1: document.querySelector('input[name="gh-g1"]:checked')?.value || '남성',
      name2: document.getElementById('gh-name2').value.trim(),
      date2: getDateValue('gh-date2'),
      gender2: document.querySelector('input[name="gh-g2"]:checked')?.value || '여성',
    };
    if (!data.name1 || !data.date1 || !data.name2 || !data.date2) valid = false;
  } else if (type === 'today') {
    data = {
      name: document.getElementById('today-name').value.trim(),
      date: getDateValue('today-date'),
      gender: document.querySelector('input[name="today-g"]:checked')?.value || '남성',
    };
    if (!data.name || !data.date) valid = false;
  } else if (type === 'yearly') {
    data = {
      name: document.getElementById('yr-name').value.trim(),
      date: getDateValue('yr-date'),
      year: document.getElementById('yr-year').value,
      month: document.getElementById('yr-month').value,
    };
    if (!data.name || !data.date) valid = false;
  } else if (type === 'zodiac') {
    data = {
      zodiac: selectedZodiac,
      period: document.getElementById('zodiac-period').value,
    };
    if (!data.zodiac) { alert('띠를 선택해 주세요.'); return; }
  }

  if (!valid) { alert('필수 정보를 모두 입력해 주세요.'); return; }

  currentType = type;
  currentResultEl = document.getElementById('result-' + type);

  openModal(type, data);
}

// ─── Modal ────────────────────────────────────────────
let timerInterval = null;

function openModal(type, data) {
  const overlay = document.getElementById('modal');
  const timerEl = document.getElementById('modal-timer');
  const loadingEl = document.getElementById('modal-loading');
  const resultTextEl = document.getElementById('modal-result-text');
  const closeBtn = document.getElementById('modal-close-btn');
  const quoteEl = document.getElementById('modal-quote');
  const quoteSourceEl = document.getElementById('modal-quote-source');

  // Reset
  timerEl.textContent = '10';
  loadingEl.style.display = 'flex';
  resultTextEl.classList.remove('show');
  resultTextEl.textContent = '';
  closeBtn.classList.remove('show');
  overlay.classList.add('show');
  document.body.style.overflow = 'hidden';

  // Random quote
  const q = quotes[Math.floor(Math.random() * quotes.length)];
  quoteEl.textContent = `"${q.text}"`;
  quoteSourceEl.textContent = q.src;

  // Countdown
  let sec = 10;
  let timerDone = false;
  let aiDone = false;
  let aiResult = '';

  timerInterval = setInterval(() => {
    sec--;
    timerEl.textContent = sec;
    if (sec <= 0) {
      clearInterval(timerInterval);
      timerEl.textContent = '✓';
      timerDone = true;
      tryReveal();
    }
  }, 1000);

  // AI call
  const prompt = buildPrompt(type, data);
  callClaude(prompt).then(result => {
    aiResult = result;
    aiDone = true;
    loadingEl.style.display = 'none';
    document.getElementById('modal-result-title').textContent = '✨ 운세 분석 완료!';
    resultTextEl.textContent = '아래 버튼을 눌러 결과를 확인하세요 🔮';
    resultTextEl.classList.add('show');
    tryReveal();
  }).catch(() => {
    aiResult = '운세를 불러오는 데 문제가 생겼어요. 잠시 후 다시 시도해 주세요.';
    aiDone = true;
    loadingEl.style.display = 'none';
    document.getElementById('modal-result-title').textContent = '⚠️ 오류 발생';
    resultTextEl.textContent = '운세를 불러오는 데 문제가 생겼어요. 잠시 후 다시 시도해 주세요.';
    resultTextEl.classList.add('show');
    tryReveal();
  });

  function tryReveal() {
    if (timerDone && aiDone) {
      closeBtn.classList.add('show');
      // Pre-fill result card
      document.getElementById('result-' + currentType + '-content').innerHTML = formatResult(aiResult);
    }
  }
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
  document.body.style.overflow = '';
  clearInterval(timerInterval);
  // Show result card
  if (currentResultEl) {
    currentResultEl.classList.add('show');
    currentResultEl.scrollIntoView({ behavior:'smooth', block:'start' });
  }
}

// ─── 날짜 값 가져오기 ──────────────
function getDateValue(id) {
  const y = document.getElementById(id + '-year')?.value;
  const m = document.getElementById(id + '-month')?.value;
  const d = document.getElementById(id + '-day')?.value;
  if (!y || !m || !d) return '';
  return `${y}-${m}-${d}`;
}

// ─── 마크다운 → HTML 변환 ──────────────
function formatResult(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^#{1,3}\s+(.+)$/gm, '<h4 style="color:#C084FC;margin:14px 0 6px;font-size:1rem;">$1</h4>')
    .replace(/^[-*]\s+(.+)$/gm, '<li style="margin:4px 0 4px 16px;">$1</li>')
    .replace(/(<li.*<\/li>\n?)+/g, '<ul style="margin:8px 0;">$&</ul>')
    .replace(/\n{2,}/g, '</p><p style="margin:8px 0;">')
    .replace(/\n/g, '<br>')
    .replace(/^/, '<p style="margin:8px 0;">')
    .replace(/$/, '</p>');
}

// ─── Claude API ──────────────
async function callClaude(prompt) {
  const response = await fetch('/api/fortune', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt }),
  });
  const data = await response.json();
  if (data.error) throw new Error(data.error);
  return data.result;
}
