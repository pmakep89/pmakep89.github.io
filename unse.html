<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ 운명의 서 ✦ 사주·성명학·궁합</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Cinzel+Decorative:wght@400;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080b14;
    --bg2: #0d1225;
    --card: #111827;
    --card2: #1a2235;
    --border: #2a3a5c;
    --accent: #c9a84c;
    --accent2: #e8c96a;
    --purple: #7c5cbf;
    --purple2: #a07fe0;
    --teal: #2dd4bf;
    --text: #e8dcc8;
    --text2: #9aa3b8;
    --glow: rgba(201,168,76,0.15);
    --glow2: rgba(124,92,191,0.2);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Stars background */
  body::before {
    content:'';
    position:fixed; inset:0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(124,92,191,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(201,168,76,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 60% 80%, rgba(45,212,191,0.05) 0%, transparent 50%);
    pointer-events:none; z-index:0;
    animation: bgPulse 8s ease-in-out infinite alternate;
  }
  @keyframes bgPulse {
    from { opacity:0.6; }
    to { opacity:1; }
  }

  .stars {
    position:fixed; inset:0; pointer-events:none; z-index:0;
    overflow:hidden;
  }
  .star {
    position:absolute; border-radius:50%;
    background:#fff; animation: twinkle var(--d, 3s) var(--delay, 0s) ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    from { opacity:0.1; transform:scale(0.8); }
    to { opacity:0.9; transform:scale(1.2); }
  }

  /* Header */
  header {
    position:relative; z-index:10;
    text-align:center; padding: 50px 20px 30px;
    border-bottom: 1px solid rgba(201,168,76,0.15);
  }
  header .subtitle {
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.7rem; letter-spacing: 0.4em;
    color: var(--accent); opacity:0.8;
    margin-bottom: 12px;
    text-transform: uppercase;
  }
  header h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-weight:700;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 50%, var(--purple2) 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
    line-height:1.2; margin-bottom:10px;
  }
  header p {
    color: var(--text2); font-size:0.9rem; font-weight:300;
    letter-spacing:0.05em;
  }
  .header-ornament {
    display:flex; align-items:center; justify-content:center; gap:16px;
    margin: 16px 0 0;
    color: var(--accent); opacity:0.5; font-size:0.8rem; letter-spacing:0.3em;
  }
  .header-ornament::before, .header-ornament::after {
    content:''; flex:1; max-width:120px; height:1px;
    background: linear-gradient(90deg, transparent, var(--accent));
  }
  .header-ornament::after { background: linear-gradient(90deg, var(--accent), transparent); }

  /* Tab Nav */
  .tab-nav {
    position:relative; z-index:10;
    display:flex; gap:0; overflow-x:auto;
    padding: 20px 16px 0;
    scrollbar-width:none; -webkit-overflow-scrolling:touch;
    max-width: 900px; margin: 0 auto;
  }
  .tab-nav::-webkit-scrollbar { display:none; }
  .tab-btn {
    flex-shrink:0;
    background:none; border:none; cursor:pointer;
    padding: 10px 18px 12px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.82rem; font-weight:500;
    color: var(--text2);
    border-bottom: 2px solid transparent;
    transition: all 0.25s;
    white-space:nowrap;
    position:relative;
  }
  .tab-btn .tab-icon { font-size:1rem; display:block; margin-bottom:3px; }
  .tab-btn:hover { color: var(--accent); }
  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .tab-btn.active::after {
    content:'';
    position:absolute; bottom:-2px; left:50%; transform:translateX(-50%);
    width:6px; height:6px; border-radius:50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
  }

  /* Main Content */
  .main {
    position:relative; z-index:10;
    max-width: 700px; margin: 0 auto;
    padding: 24px 16px 60px;
  }

  .tab-panel { display:none; animation: fadeIn 0.4s ease; }
  .tab-panel.active { display:block; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

  /* Card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 24px;
    margin-bottom: 16px;
    position:relative; overflow:hidden;
  }
  .card::before {
    content:'';
    position:absolute; top:0; left:0; right:0; height:1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity:0.4;
  }
  .card-title {
    font-family: 'Noto Serif KR', serif;
    font-size:1.1rem; font-weight:600;
    color: var(--accent2);
    margin-bottom: 20px;
    display:flex; align-items:center; gap:8px;
  }
  .card-title span { font-size:1.2rem; }

  /* Form Elements */
  .form-row { margin-bottom: 16px; }
  .form-row label {
    display:block; font-size:0.78rem; color:var(--text2);
    margin-bottom:6px; letter-spacing:0.05em;
  }
  .form-row input, .form-row select {
    width:100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.9rem;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance:none;
  }
  .form-row input:focus, .form-row select:focus {
    outline:none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
  }
  .form-row select option { background: var(--bg2); }
  .form-row input::placeholder { color: #4a5568; }

  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  @media(max-width:400px) { .form-grid { grid-template-columns:1fr; } }

  .radio-group { display:flex; gap:12px; }
  .radio-label {
    flex:1; display:flex; align-items:center; justify-content:center;
    gap:8px; padding:10px; border-radius:10px;
    border:1px solid var(--border); cursor:pointer;
    color:var(--text2); font-size:0.85rem;
    transition: all 0.2s; background: var(--bg2);
  }
  .radio-label input { display:none; }
  .radio-label.checked {
    border-color: var(--accent); color:var(--accent);
    background: rgba(201,168,76,0.08);
    box-shadow: 0 0 12px rgba(201,168,76,0.1);
  }

  /* CTA Button */
  .btn-divine {
    width:100%; padding: 16px;
    background: linear-gradient(135deg, #8b6914, var(--accent), #c9a84c);
    border:none; border-radius:12px; cursor:pointer;
    font-family: 'Noto Serif KR', serif;
    font-size:1rem; font-weight:600; color:#080b14;
    letter-spacing:0.08em;
    transition: all 0.3s;
    position:relative; overflow:hidden;
    margin-top:8px;
  }
  .btn-divine::before {
    content:'';
    position:absolute; inset:0;
    background: linear-gradient(135deg, transparent, rgba(255,255,255,0.2), transparent);
    transform: translateX(-100%);
    transition: transform 0.5s;
  }
  .btn-divine:hover { transform:translateY(-2px); box-shadow: 0 8px 24px rgba(201,168,76,0.3); }
  .btn-divine:hover::before { transform: translateX(100%); }
  .btn-divine:active { transform:translateY(0); }

  /* Divider */
  .divider {
    display:flex; align-items:center; gap:12px;
    margin: 8px 0 16px; color:var(--text2); font-size:0.75rem;
  }
  .divider::before, .divider::after {
    content:''; flex:1; height:1px; background:var(--border);
  }

  /* Ad Modal */
  .modal-overlay {
    position:fixed; inset:0; z-index:1000;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    display:none; align-items:center; justify-content:center;
    padding:16px;
  }
  .modal-overlay.show { display:flex; }
  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    width:100%; max-width:480px;
    overflow:hidden;
    position:relative;
    box-shadow: 0 24px 60px rgba(0,0,0,0.6), 0 0 60px rgba(124,92,191,0.1);
    animation: modalIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes modalIn {
    from { opacity:0; transform:scale(0.85) translateY(20px); }
    to { opacity:1; transform:scale(1) translateY(0); }
  }

  .modal-ad-top {
    background: linear-gradient(135deg, #0d1225, #1a1035);
    border-bottom:1px solid var(--border);
    padding:14px 20px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .ad-badge {
    font-size:0.65rem; color:var(--text2);
    background:rgba(255,255,255,0.06);
    padding:3px 8px; border-radius:4px;
    letter-spacing:0.1em; text-transform:uppercase;
  }
  .modal-timer-wrap {
    display:flex; align-items:center; gap:6px;
  }
  .modal-timer {
    font-family: 'Cinzel Decorative', serif;
    font-size:1.1rem; color:var(--accent);
    min-width:24px; text-align:center;
  }
  .modal-timer-label { font-size:0.72rem; color:var(--text2); }

  .modal-ad-content {
    padding: 28px 24px 20px;
    text-align:center;
  }
  .modal-quote {
    font-family: 'Noto Serif KR', serif;
    font-size:1.15rem; font-weight:600;
    color: var(--accent2);
    line-height:1.7; margin-bottom:12px;
  }
  .modal-quote-source {
    font-size:0.8rem; color:var(--text2);
    font-style:italic;
  }

  .modal-divider {
    height:1px; background: var(--border);
    margin: 20px 0;
  }

  .modal-result-area {
    padding: 0 24px 24px;
  }
  .modal-result-title {
    font-size:0.75rem; color:var(--text2);
    letter-spacing:0.12em; text-transform:uppercase;
    margin-bottom:14px;
    display:flex; align-items:center; gap:8px;
  }
  .modal-result-title::after {
    content:''; flex:1; height:1px; background:var(--border);
  }

  .result-loading {
    display:flex; flex-direction:column; align-items:center; gap:12px;
    padding:20px 0; color:var(--text2);
  }
  .result-spinner {
    width:36px; height:36px;
    border:2px solid var(--border);
    border-top-color: var(--accent);
    border-radius:50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  .result-loading p { font-size:0.82rem; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

  .result-text {
    display:none;
    font-family:'Noto Serif KR', serif;
    font-size:0.88rem; line-height:1.9;
    color:var(--text);
  }
  .result-text.show { display:block; animation: fadeIn 0.5s ease; }

  .modal-close-btn {
    display:none; width:100%; padding:13px;
    background: linear-gradient(135deg, var(--purple), var(--purple2));
    border:none; border-radius:0 0 20px 20px;
    color:#fff; font-family:'Noto Sans KR', sans-serif;
    font-size:0.9rem; font-weight:500;
    cursor:pointer; transition:opacity 0.2s;
    letter-spacing:0.05em;
  }
  .modal-close-btn:hover { opacity:0.9; }
  .modal-close-btn.show { display:block; animation: fadeIn 0.3s ease; }

  /* Result section (after modal) */
  .result-card {
    display:none;
    background: var(--card2);
    border:1px solid rgba(201,168,76,0.2);
    border-radius:16px; padding:24px;
    margin-top:16px;
    animation: fadeIn 0.5s ease;
  }
  .result-card.show { display:block; }
  .result-card-header {
    display:flex; align-items:center; gap:10px;
    margin-bottom:18px;
    padding-bottom:14px;
    border-bottom:1px solid var(--border);
  }
  .result-icon { font-size:1.5rem; }
  .result-card-title {
    font-family:'Noto Serif KR', serif;
    font-size:1rem; font-weight:600; color:var(--accent2);
  }
  .result-content {
    font-family:'Noto Serif KR', serif;
    font-size:0.88rem; line-height:2;
    color:var(--text); white-space:pre-wrap;
  }

  /* Section divider label */
  .section-label {
    font-size:0.72rem; color:var(--text2);
    letter-spacing:0.15em; text-transform:uppercase;
    margin-bottom:16px; margin-top:28px;
    display:flex; align-items:center; gap:10px;
  }
  .section-label::before { content:'✦'; color:var(--accent); font-size:0.6rem; }

  /* Zodiac grid */
  .zodiac-grid {
    display:grid; grid-template-columns: repeat(4, 1fr); gap:8px;
    margin-bottom:16px;
  }
  .zodiac-btn {
    background:var(--bg2); border:1px solid var(--border);
    border-radius:10px; padding:10px 4px;
    cursor:pointer; text-align:center;
    transition:all 0.2s; color:var(--text2);
    font-size:0.75rem; font-family:'Noto Sans KR',sans-serif;
  }
  .zodiac-btn .z-icon { font-size:1.4rem; display:block; margin-bottom:4px; }
  .zodiac-btn:hover { border-color:var(--accent); color:var(--accent); }
  .zodiac-btn.selected {
    border-color:var(--accent); color:var(--accent);
    background:rgba(201,168,76,0.08);
    box-shadow:0 0 12px rgba(201,168,76,0.1);
  }

  /* Compatibility hearts */
  .compat-section {
    display:grid; grid-template-columns:1fr auto 1fr; gap:12px; align-items:start;
  }
  .compat-divider-icon {
    display:flex; align-items:center; justify-content:center;
    padding-top:28px; font-size:1.4rem; color:var(--purple2);
  }

  /* Responsive */
  @media(max-width:480px) {
    .card { padding:20px 16px; }
    .modal { border-radius:16px; }
    .modal-ad-content { padding:20px 16px 16px; }
    .modal-result-area { padding:0 16px 20px; }
  }
</style>
</head>
<body>

<!-- Stars -->
<div class="stars" id="stars"></div>

<!-- Header -->
<header>
  <div class="subtitle">✦ Mystic Oracle ✦</div>
  <h1>운명의 서</h1>
  <p>사주 · 성명학 · 궁합 · 오늘의 운세</p>
  <div class="header-ornament">✦ ✦ ✦</div>
</header>

<!-- Tabs -->
<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('saju')">
    <span class="tab-icon">🔮</span>사주
  </button>
  <button class="tab-btn" onclick="switchTab('sungmyung')">
    <span class="tab-icon">✍️</span>성명학
  </button>
  <button class="tab-btn" onclick="switchTab('gunghap')">
    <span class="tab-icon">💫</span>궁합
  </button>
  <button class="tab-btn" onclick="switchTab('today')">
    <span class="tab-icon">☀️</span>오늘의 운세
  </button>
  <button class="tab-btn" onclick="switchTab('yearly')">
    <span class="tab-icon">🌟</span>신년/월별
  </button>
  <button class="tab-btn" onclick="switchTab('zodiac')">
    <span class="tab-icon">🐉</span>띠별
  </button>
</div>

<!-- Main -->
<div class="main">

  <!-- 사주 -->
  <div class="tab-panel active" id="tab-saju">
    <div class="card">
      <div class="card-title"><span>🔮</span> 사주팔자 풀이</div>
      <div class="form-row">
        <label>이름</label>
        <input type="text" id="saju-name" placeholder="이름을 입력하세요">
      </div>
      <div class="form-row">
        <label>생년월일</label>
        <input type="date" id="saju-date">
      </div>
      <div class="form-row">
        <label>태어난 시간 (선택)</label>
        <select id="saju-hour">
          <option value="">모름 / 선택 안함</option>
          <option value="자시 (23:00-01:00)">자시 (23:00~01:00)</option>
          <option value="축시 (01:00-03:00)">축시 (01:00~03:00)</option>
          <option value="인시 (03:00-05:00)">인시 (03:00~05:00)</option>
          <option value="묘시 (05:00-07:00)">묘시 (05:00~07:00)</option>
          <option value="진시 (07:00-09:00)">진시 (07:00~09:00)</option>
          <option value="사시 (09:00-11:00)">사시 (09:00~11:00)</option>
          <option value="오시 (11:00-13:00)">오시 (11:00~13:00)</option>
          <option value="미시 (13:00-15:00)">미시 (13:00~15:00)</option>
          <option value="신시 (15:00-17:00)">신시 (15:00~17:00)</option>
          <option value="유시 (17:00-19:00)">유시 (17:00~19:00)</option>
          <option value="술시 (19:00-21:00)">술시 (19:00~21:00)</option>
          <option value="해시 (21:00-23:00)">해시 (21:00~23:00)</option>
        </select>
      </div>
      <div class="form-row">
        <label>성별</label>
        <div class="radio-group">
          <label class="radio-label checked" id="saju-male-label">
            <input type="radio" name="saju-gender" value="남성" checked onchange="updateRadio('saju-gender')"> 👨 남성
          </label>
          <label class="radio-label" id="saju-female-label">
            <input type="radio" name="saju-gender" value="여성" onchange="updateRadio('saju-gender')"> 👩 여성
          </label>
        </div>
      </div>
      <button class="btn-divine" onclick="submitForm('saju')">✦ 사주팔자 보기 ✦</button>
    </div>
    <div class="result-card" id="result-saju">
      <div class="result-card-header">
        <span class="result-icon">🔮</span>
        <span class="result-card-title">나의 사주팔자</span>
      </div>
      <div class="result-content" id="result-saju-content"></div>
    </div>
  </div>

  <!-- 성명학 -->
  <div class="tab-panel" id="tab-sungmyung">
    <div class="card">
      <div class="card-title"><span>✍️</span> 성명학 이름 풀이</div>
      <div class="form-row">
        <label>이름 (한글)</label>
        <input type="text" id="sm-name" placeholder="예: 김민준">
      </div>
      <div class="form-row">
        <label>생년월일 (선택 — 더 정확한 풀이)</label>
        <input type="date" id="sm-date">
      </div>
      <button class="btn-divine" onclick="submitForm('sungmyung')">✦ 이름 풀이 보기 ✦</button>
    </div>
    <div class="result-card" id="result-sungmyung">
      <div class="result-card-header">
        <span class="result-icon">✍️</span>
        <span class="result-card-title">성명학 풀이</span>
      </div>
      <div class="result-content" id="result-sungmyung-content"></div>
    </div>
  </div>

  <!-- 궁합 -->
  <div class="tab-panel" id="tab-gunghap">
    <div class="card">
      <div class="card-title"><span>💫</span> 사주 궁합</div>
      <div class="compat-section">
        <div>
          <div class="section-label">나</div>
          <div class="form-row"><label>이름</label><input type="text" id="gh-name1" placeholder="내 이름"></div>
          <div class="form-row"><label>생년월일</label><input type="date" id="gh-date1"></div>
          <div class="form-row">
            <label>성별</label>
            <div class="radio-group">
              <label class="radio-label checked" id="gh-m1">
                <input type="radio" name="gh-g1" value="남성" checked onchange="updateRadio('gh-g1')"> 👨
              </label>
              <label class="radio-label" id="gh-f1">
                <input type="radio" name="gh-g1" value="여성" onchange="updateRadio('gh-g1')"> 👩
              </label>
            </div>
          </div>
        </div>
        <div class="compat-divider-icon">💞</div>
        <div>
          <div class="section-label">상대방</div>
          <div class="form-row"><label>이름</label><input type="text" id="gh-name2" placeholder="상대방 이름"></div>
          <div class="form-row"><label>생년월일</label><input type="date" id="gh-date2"></div>
          <div class="form-row">
            <label>성별</label>
            <div class="radio-group">
              <label class="radio-label" id="gh-m2">
                <input type="radio" name="gh-g2" value="남성" onchange="updateRadio('gh-g2')"> 👨
              </label>

function buildPrompt(type, data) {

생년월일: ${data.date}
태어난 시간: ${data.hour || '모름'}
성별: ${data.gender}

다음 항목을 포함하여 친절하고 신비로운 문체로 한국어로 작성해 주세요:
1. 사주 기본 구조 (연주·월주·일주·시주 간략 설명)

4. 애정운
5. 건강운
6. 올해(2026년) 전반적인 운세 한마디

각 항목은 줄바꿈으로 구분하고, 이모지 없이 격조 있게 써 주세요. 총 500자 내외.`;
  }

  if (type === 'sungmyung') {
    return `당신은 한국 성명학 전문가입니다. 아래 이름을 성명학적으로 풀이해 주세요.

이름: ${data.name}
생년월일: ${data.date || '미입력'}

다음을 포함하여 격조 있는 한국어로 작성해 주세요:
1. 이름의 획수 분석 (원격·형격·이격·정격 간략 설명)
2. 이름이 지닌 기운과 의미
3. 이름이 삶에 미치는 영향 (성격, 대인관계, 사회운)
4. 이름의 전반적인 길흉 판단
5. 보완 조언 (색깔, 방향, 숫자 등)

500자 내외, 이모지 없이 전통적인 문체로.`;
  }

  if (type === 'gunghap') {
    return `당신은 한국 전통 사주 궁합 전문가입니다.

첫 번째 사람:
- 이름: ${data.name1}
- 생년월일: ${data.date1}
- 성별: ${data.gender1}

두 번째 사람:
- 이름: ${data.name2}
- 생년월일: ${data.date2}
- 성별: ${data.gender2}

두 사람의 궁합을 다음 항목으로 분석해 주세요:
1. 두 사람의 띠 궁합
2. 오행(五行) 상생·상극 관계
3. 애정 궁합 (0~100점 척도로 점수 포함)
4. 결혼/인연 궁합
5. 함께할 때 주의할 점
6. 두 사람에게 전하는 한마디

600자 내외, 이모지 없이 격조 있게.`;
  }

  if (type === 'today') {
    return `당신은 한국 전통 명리학 전문가입니다.

이름: ${data.name}
생년월일: ${data.date}
성별: ${data.gender}
오늘 날짜: ${today}

오늘 하루의 운세를 다음 항목으로 풀이해 주세요:
1. 오늘의 전체 운세 (한 문장 요약)

3. 오늘의 애정운
4. 오늘의 건강·컨디션
5. 오늘의 행운 키워드 (숫자, 색깔, 방향 중 하나)
6. 오늘 하루를 위한 조언 한마디

400자 내외, 따뜻하고 신비로운 문체로.`;
  }

  if (type === 'yearly') {
    const period = data.month ? `${data.year}년 ${data.month}월` : `${data.year}년 전체`;
    return `당신은 한국 전통 명리학 전문가입니다.

이름: ${data.name}
생년월일: ${data.date}
분석 기간: ${period}

해당 기간의 운세를 다음 항목으로 풀이해 주세요:

4. 건강운
5. 특히 조심해야 할 시기나 주의사항
6. ${period}을 잘 보내기 위한 조언

  }

  if (type === 'zodiac') {

기간: ${data.period}

${data.zodiac}의 ${data.period} 운세를 다음 항목으로 풀이해 주세요:
1. 전반적인 운세 흐름
2. 재물·직업운

// ─── Modal state ──────────────────────────────────────
let currentType = '';
let currentResultEl = null;

// ─── Submit ───────────────────────────────────────────
function submitForm(type) {
  let data = {};
  let valid = true;

  if (type === 'saju') {
    data = {
      name: document.getElementById('saju-name').value.trim(),
      date: document.getElementById('saju-date').value,
      hour: document.getElementById('saju-hour').value,
      gender: document.querySelector('input[name="saju-gender"]:checked')?.value || '남성'
    };
    if (!data.name || !data.date) valid = false;
  } else if (type === 'sungmyung') {
    data = {
      name: document.getElementById('sm-name').value.trim(),
      date: document.getElementById('sm-date').value,
    };
    if (!data.name) valid = false;
  } else if (type === 'gunghap') {
    data = {
      name1: document.getElementById('gh-name1').value.trim(),
      date1: document.getElementById('gh-date1').value,
      gender1: document.querySelector('input[name="gh-g1"]:checked')?.value || '남성',
      name2: document.getElementById('gh-name2').value.trim(),
      date2: document.getElementById('gh-date2').value,
      gender2: document.querySelector('input[name="gh-g2"]:checked')?.value || '여성',
    };
    if (!data.name1 || !data.date1 || !data.name2 || !data.date2) valid = false;
  } else if (type === 'today') {
    data = {
      name: document.getElementById('today-name').value.trim(),
      date: document.getElementById('today-date').value,
      gender: document.querySelector('input[name="today-g"]:checked')?.value || '남성',
    };
    if (!data.name || !data.date) valid = false;
  } else if (type === 'yearly') {
    data = {
      name: document.getElementById('yr-name').value.trim(),
      date: document.getElementById('yr-date').value,
      year: document.getElementById('yr-year').value,
      month: document.getElementById('yr-month').value,
    };
    if (!data.name || !data.date) valid = false;
  } else if (type === 'zodiac') {
    data = {
      zodiac: selectedZodiac,
      period: document.getElementById('zodiac-period').value,
    };
    if (!data.zodiac) { alert('띠를 선택해 주세요.'); return; }
  }

  if (!valid) { alert('필수 정보를 모두 입력해 주세요.'); return; }

  currentType = type;
  currentResultEl = document.getElementById('result-' + type);

  openModal(type, data);
}

// ─── Modal ────────────────────────────────────────────
let timerInterval = null;

function openModal(type, data) {
  const overlay = document.getElementById('modal');
  const timerEl = document.getElementById('modal-timer');
  const loadingEl = document.getElementById('modal-loading');
  const resultTextEl = document.getElementById('modal-result-text');
  const closeBtn = document.getElementById('modal-close-btn');
  const quoteEl = document.getElementById('modal-quote');
  const quoteSourceEl = document.getElementById('modal-quote-source');

  // Reset
  timerEl.textContent = '5';
  loadingEl.style.display = 'flex';
  resultTextEl.classList.remove('show');
  resultTextEl.textContent = '';
  closeBtn.classList.remove('show');
  overlay.classList.add('show');
  document.body.style.overflow = 'hidden';

  // Random quote
  const q = quotes[Math.floor(Math.random() * quotes.length)];
  quoteEl.textContent = `"${q.text}"`;
  quoteSourceEl.textContent = q.src;

  // Countdown
  let sec = 5;
  let timerDone = false;
  let aiDone = false;
  let aiResult = '';

  timerInterval = setInterval(() => {
    sec--;
    timerEl.textContent = sec;
    if (sec <= 0) {
      clearInterval(timerInterval);
      timerEl.textContent = '✓';
      timerDone = true;
      tryReveal();
    }
  }, 1000);

  // AI call
  const prompt = buildPrompt(type, data);
  callClaude(prompt).then(result => {
    aiResult = result;
    aiDone = true;
    loadingEl.style.display = 'none';
    resultTextEl.textContent = result;
    resultTextEl.classList.add('show');
    tryReveal();
  }).catch(() => {
    aiResult = '운세를 불러오는 데 문제가 생겼어요. 잠시 후 다시 시도해 주세요.';
    aiDone = true;
    loadingEl.style.display = 'none';
    resultTextEl.textContent = aiResult;
    resultTextEl.classList.add('show');
    tryReveal();
  });

  function tryReveal() {
    if (timerDone && aiDone) {
      closeBtn.classList.add('show');
      // Pre-fill result card
      document.getElementById('result-' + currentType + '-content').textContent = aiResult;
    }
  }
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
  document.body.style.overflow = '';
  clearInterval(timerInterval);
  // Show result card
  if (currentResultEl) {
    currentResultEl.classList.add('show');
    currentResultEl.scrollIntoView({ behavior:'smooth', block:'start' });
  }
}

// ─── Claude API (Netlify Function 경유) ──────────────
async function callClaude(prompt) {
  const response = await fetch('/api/fortune', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt }),
  });
  const data = await response.json();
  if (data.error) throw new Error(data.error);
  return data.result;
}
